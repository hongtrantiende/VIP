<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 340px; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
h2 { font-size: 15px; color: #00d4ff; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
h2 span { font-size: 18px; }
.section { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #0f3460; }
.section h3 { font-size: 12px; color: #7ec8e3; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; margin-bottom: 6px; }
input[type="checkbox"] { accent-color: #00d4ff; width: 16px; height: 16px; }
select { background: #0f3460; color: #e0e0e0; border: 1px solid #1a4080; border-radius: 4px; padding: 4px 8px; font-size: 12px; width: 100%; }
textarea { width: 100%; height: 100px; background: #0a0f1e; color: #00ff88; border: 1px solid #1a4080; border-radius: 4px; padding: 8px; font-size: 11px; font-family: 'Consolas', monospace; resize: vertical; }
textarea::placeholder { color: #4a6080; }
.status { font-size: 11px; color: #7ec8e3; margin-top: 6px; padding: 4px 8px; background: #0a0f1e; border-radius: 4px; }
.status.ok { color: #00ff88; }
.status.warn { color: #ffa500; }
button { background: #00d4ff; color: #0a0f1e; border: none; border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 8px; }
button:hover { background: #00b8d4; }
.badge { display: inline-block; background: #00d4ff; color: #0a0f1e; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }
</style>
</head><body>
<h2><span>🛡️</span> Novel Studio v6.0</h2>

<div class="section">
  <h3>🔒 Stealth Mode</h3>
  <label><input type="checkbox" id="stealthOn" checked disabled> Anti-Bot Stealth (luôn bật)</label>
  <div class="status ok">✅ 14 fingerprint spoofs active</div>
</div>

<div class="section">
  <h3>🌐 Proxy Rotation</h3>
  <label><input type="checkbox" id="proxyEnabled"> Bật Proxy Rotation</label>
  <label style="margin-top:4px">Chế độ:
    <select id="rotateMode">
      <option value="per-chapter">Đổi IP mỗi chương</option>
      <option value="per-5">Đổi IP mỗi 5 chương</option>
      <option value="disabled">Tắt rotation</option>
    </select>
  </label>
  <textarea id="proxyInput" placeholder="Nhập proxy (1 dòng/proxy):&#10;host:port&#10;host:port:user:pass&#10;socks5://host:port"></textarea>
  <div class="status" id="proxyStatus">⏸ Proxy chưa bật</div>
  <button id="saveBtn">💾 Lưu Proxy</button>
</div>

<script src="popup.js"></script>
</body></html>
